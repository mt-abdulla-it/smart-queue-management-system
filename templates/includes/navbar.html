{% load static %}
{% load core_tags %}
<!-- ========== Top Navigation Bar ========== -->
<nav class="top-navbar">
    <div class="d-flex align-items-center">
        <!-- Sidebar Toggle Button -->
        <button class="btn btn-link sidebar-toggle me-3" id="sidebarToggle" aria-label="Toggle sidebar">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Page Title -->
        <h5 class="mb-0 page-title d-none d-md-block">
            {% block page_header %}{% endblock %}
        </h5>
    </div>

    <div class="d-flex align-items-center gap-2 gap-md-3">

        <!-- Dark Mode Toggle -->
        <button class="btn btn-link nav-icon" id="darkModeToggle" title="Toggle dark mode">
            <i class="fas fa-moon" id="darkModeIcon"></i>
        </button>

        <!-- Notifications -->
        <div class="dropdown">
            <button class="btn btn-link nav-icon position-relative" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-bell"></i>
                {% if unread_notifications_count > 0 %}
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger notification-badge">
                        {{ unread_notifications_count }}
                    </span>
                {% endif %}
            </button>
            <ul class="dropdown-menu dropdown-menu-end notification-dropdown">
                <li><h6 class="dropdown-header">Notifications</h6></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-center text-muted" href="{% url 'notifications:list' %}">
                        View All Notifications
                    </a>
                </li>
            </ul>
        </div>

        <!-- User Menu -->
        <div class="dropdown">
            <button class="btn btn-link d-flex align-items-center gap-2 user-dropdown" data-bs-toggle="dropdown">
                <div class="user-avatar">
                    {% if user.profile_image %}
                        <img src="{{ user.profile_image.url }}" alt="{{ user.get_full_name }}" class="rounded-circle">
                    {% else %}
                        <div class="avatar-initials">
                            {{ user.first_name.0 }}{{ user.last_name.0 }}
                        </div>
                    {% endif %}
                    <span class="status-dot"></span>
                </div>
                <div class="d-none d-md-block text-start">
                    <div class="user-name">{{ user.get_full_name }}</div>
                    <small class="user-role">{{ user.get_role_display }}</small>
                </div>
                <i class="fas fa-chevron-down ms-1 d-none d-md-inline"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                        <i class="fas fa-user me-2"></i>My Profile
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
