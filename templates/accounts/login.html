{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login — {{ site_name }}{% endblock %}

{% block public_content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="brand-icon mx-auto mb-3" style="width: 50px; height: 50px;">
                                <i class="fas fa-hospital-user fs-4 text-white"></i>
                            </div>
                            <h4 class="fw-bold">Welcome Back</h4>
                            <p class="text-muted">Sign in to your account</p>
                        </div>

                        <form method="post" novalidate>
                            {% csrf_token %}
                            {{ form|crispy }}
                            
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <a href="{% url 'accounts:password_reset' %}" class="small text-decoration-none">Forgot password?</a>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted mb-0">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-decoration-none fw-semibold">Sign up</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
