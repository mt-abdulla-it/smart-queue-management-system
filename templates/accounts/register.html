{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register — {{ site_name }}{% endblock %}

{% block public_content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="brand-icon mx-auto mb-3" style="width: 50px; height: 50px;">
                                <i class="fas fa-hospital-user fs-4 text-white"></i>
                            </div>
                            <h4 class="fw-bold">Create an Account</h4>
                            <p class="text-muted">Join Smart Queue to skip the wait.</p>
                        </div>

                        <form method="post" novalidate>
                            {% csrf_token %}
                            {{ form|crispy }}
                            
                            <button type="submit" class="btn btn-primary w-100 mt-4 mb-3">
                                <i class="fas fa-user-plus me-2"></i>Register
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted mb-0">Already have an account? <a href="{% url 'accounts:login' %}" class="text-decoration-none fw-semibold">Sign in</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
