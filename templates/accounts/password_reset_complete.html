{% extends 'base.html' %}

{% block title %}Password Reset Complete — {{ site_name }}{% endblock %}

{% block public_content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4 text-center">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <i class="fas fa-check-circle fa-3x text-success mb-4"></i>
                        <h4 class="fw-bold">Password Reset Complete</h4>
                        <p class="text-muted mb-4">Your password has been set. You may go ahead and log in now.</p>
                        
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Log in
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
