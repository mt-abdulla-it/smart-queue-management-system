{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}

{% block public_content %}
<style>
    .error-container {
        min-height: 100vh;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .error-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 1.5rem;
        padding: 4rem 3rem;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05);
        max-width: 480px;
        width: 100%;
        animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(40px);
    }
    .error-code {
        font-size: 8rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ff6b6b, #c0392b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0;
        line-height: 1;
        animation: gentlePulse 3s infinite ease-in-out;
    }
    .error-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #2d3436;
        margin: 1.5rem 0 1rem;
        letter-spacing: -0.02em;
    }
    .error-message {
        color: #636e72;
        font-size: 1.1rem;
        margin-bottom: 2.5rem;
        line-height: 1.6;
    }
    .btn-home {
        background: linear-gradient(135deg, #0984e3, #74b9ff);
        color: white;
        border: none;
        padding: 1rem 2.5rem;
        font-size: 1.05rem;
        font-weight: 600;
        border-radius: 3rem;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3);
    }
    .btn-home:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(9, 132, 227, 0.45);
        color: white;
    }
    .btn-home i {
        font-size: 1.1rem;
    }
    
    @keyframes slideUp {
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes gentlePulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
    }
</style>

<div class="error-container">
    <div class="error-card">
        <h1 class="error-code">500</h1>
        <h3 class="error-title">Internal Server Error</h3>
        <p class="error-message">Oops! Something went wrong on our servers. We are currently looking into the issue. Please try again later.</p>
        <a href="/" class="btn-home">
            <i class="fas fa-arrow-left"></i> Back to Homepage
        </a>
    </div>
</div>
{% endblock %}
